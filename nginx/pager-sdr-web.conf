server {
    listen 8000;
    listen [::]:8000;
    server_name _;
    root /var/www/pager-ui;

    location = / { try_files /index.html =404; }
    location = /index.html { expires -1; }
    location / { try_files $uri =404; }

    location = /data/messages.log {
        alias /var/lib/pager/messages.log;
        add_header Cache-Control "no-store";
        add_header Access-Control-Allow-Origin "*";
    }

    location = /data/health.json {
        alias /var/lib/pager/health.json;
        add_header Cache-Control "no-store";
        add_header Access-Control-Allow-Origin "*";
    }
}
